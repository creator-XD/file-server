name: Сборка и тестирование

on:
  push:
    branches:
      - main
      - master

  pull_request:

jobs:
  tests:
    name: Сборка и тесты

    runs-on: ubuntu-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Создание файла окружения для CI
        run: |
          cat > .env <<'EOF'
          APP_ENV=dev

          DB_HOST=db
          DB_PORT=5432
          DB_NAME=file_server
          DB_USER=file_user
          DB_PASSWORD=file_password

          S3_ENDPOINT=http://minio:9000
          S3_REGION=us-east-1
          S3_BUCKET=file-server
          S3_ACCESS_KEY=minioadmin
          S3_SECRET_KEY=minioadmin

          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          EOF
      - name: Сборка Docker-контейнеров
        run: docker compose build

      - name: Запуск Docker-контейнеров
        run: docker compose up -d

      - name: Проверка запущенных контейнеров
        run: docker compose ps

      - name: Ожидание готовности PostgreSQL
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U file_user -d file_server; then
              echo "PostgreSQL готов"
              exit 0
            fi

            echo "Ожидание PostgreSQL..."
            sleep 2
          done

          echo "PostgreSQL не запустился вовремя"
          exit 1

      - name: Применение миграций
        run: |
          docker compose exec -T app \
            vendor/bin/doctrine-migrations migrations:migrate \
            --configuration=migrations.php \
            --db-configuration=migrations-db.php \
            --no-interaction

      - name: Создание пользователя для интеграционных тестов
        run: |
          docker compose exec -T app \
            php scripts/create_user.php test_api 123456

      - name: Запуск модульных тестов
        run: |
          docker compose exec -T app \
            vendor/bin/phpunit --testsuite Unit

      - name: Запуск интеграционных тестов
        run: |
          docker compose exec -T app \
            vendor/bin/phpunit --testsuite Integration

      - name: Вывод логов при ошибке
        if: failure()
        run: |
          docker compose logs app
          docker compose logs db
          docker compose logs minio

      - name: Остановка и очистка контейнеров
        if: always()
        run: docker compose down -v
